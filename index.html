<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Login | Acadex Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="premium-theme auth-page-bg">
    <div class="background-glow"></div>
    
    <div class="auth-center-wrapper">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <i class="fas fa-crown gold-text main-logo-icon"></i>
                <h1>ACADEX <span class="pro-badge">PRO</span></h1>
                <p>Login to your premium vault</p>
            </div>
            
            <form id="loginForm" class="vip-form">
                <div class="input-field">
                    <label><i class="fas fa-user-graduate"></i> Student ID</label>
                    <input type="text" id="loginID" placeholder="Enter your ID" required class="vip-input">
                </div>
                <div class="input-field">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required class="vip-input">
                </div>
                <button type="submit" class="btn-vip-add">Access Vault</button>
            </form>
            
            <div class="auth-footer">
                <p>New Student? <a href="register.html" class="gold-link">Create VIP Account</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
